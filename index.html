<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Навигатор 2026: Сравнение карт, вкладов, кредитов и займов онлайн</title>
    <meta name="description" content="Актуальный агрегатор финансовых предложений банков РФ. Сравните условия, выберите дебетовые и кредитные карты, выгодные микрозаймы, вклады и РКО с онлайн-заявкой.">
    <style>
        :root {
            --primary: #0052cc; --primary-hover: #0041a3; --success: #00cc66; --success-hover: #00b359;
            --bg: #f4f6f9; --card-bg: #ffffff; --text: #2c3e50; --muted: #7f8c8d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, #0052cc 0%, #002d72 100%); color: #fff; padding: 40px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .tabs-container { background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; overflow-x: auto; max-width: 1200px; margin: 0 auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; padding: 18px 25px; font-weight: 600; color: var(--text); cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #f0f5ff; }
        .offers-content { display: none; padding: 20px 0; }
        .offers-content.active { display: block; }
        .card-item { background: var(--card-bg); border-radius: 10px; padding: 25px; display: grid; grid-template-columns: 220px 1fr 200px; gap: 25px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .bank-name { font-size: 22px; font-weight: 800; }
        .btn-apply { display: block; background: var(--success); color: #fff; padding: 14px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; }
        .erid-label { font-size: 10px; color: #a4b0be; margin-top: 8px; display: block; text-align: center; }
        @media (max-width: 900px) { .card-item { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>
<header><h1>Финансовый Навигатор 2026</h1></header>
<div class="tabs-container">
    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('debit')">Дебетовые карты</button>
        <button class="tab-btn" onclick="switchTab('credit')">Кредиты</button>
        <button class="tab-btn" onclick="switchTab('deposits')">Вклады</button>
        <button class="tab-btn" onclick="switchTab('loans')">МФО</button>
        <button class="tab-btn" onclick="switchTab('rko')">Бизнес</button>
    </nav>
</div>
<div class="container">
    <!-- Краткий пример структуры для одной вкладки (в полном коде - 5 вкладок с предложениями Пампаду) -->
    <div id="debit" class="offers-content active">
        <div class="card-item">
            <div class="bank-info"><div class="bank-name">Т-Банк</div></div>
            <div class="details"><h3>Black МИР</h3><p>Кэшбэк до 15%</p></div>
            <div class="action-box">
                <a href="https://ppdu.ru" class="btn-apply">Оформить</a>
                <span class="erid-label">erid: Kra23xCCG</span>
            </div>
        </div>
        <!-- Дополнительные карточки (Альфа, Ozon и др.) -->
    </div>
</div>
<script>
    function switchTab(tabId) {
        document.querySelectorAll('.offers-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
